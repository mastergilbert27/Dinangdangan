<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Supabase Integration</title>
</head>
<body>
    <h1>Welcome to Dinangdangan</h1>

    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.js"></script>
    <script>
        // Supabase Initialization
        const { createClient } = supabase;
        const supabaseUrl = 'YOUR_SUPABASE_URL';  // Replace with your Supabase URL
        const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';  // Replace with your Supabase anonymous key
        const supabase = createClient(supabaseUrl, supabaseKey);

        // Map Functionality
        function initMap() {
            const map = new google.maps.Map(document.getElementById('map'), {
                zoom: 8,
                center: { lat: -34.397, lng: 150.644 }, // Replace with dynamic center coordinates
            });
        }

        // Load the Google Maps script
        const script = document.createElement('script');
        script.src = 'https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap';
        script.async = true;
        document.head.appendChild(script);

        // Script Section for Bulletins, Residents, and Officials Management
        async function fetchBulletins() {
            const { data, error } = await supabase
                .from('bulletins')
                .select('*');
            if (error) console.error('Error fetching bulletins:', error);
            else console.log(data);
        }

        async function fetchResidents() {
            const { data, error } = await supabase
                .from('residents')
                .select('*');
            if (error) console.error('Error fetching residents:', error);
            else console.log(data);
        }

        async function fetchOfficials() {
            const { data, error } = await supabase
                .from('officials')
                .select('*');
            if (error) console.error('Error fetching officials:', error);
            else console.log(data);
        }

        // Load data
        fetchBulletins();
        fetchResidents();
        fetchOfficials();
    </script>
</body>
</html>
